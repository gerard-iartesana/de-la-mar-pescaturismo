<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva Confirmada — De la Mar a sa Taula</title>
  <meta name="description" content="Tu reserva de pescaturismo en Mallorca ha sido confirmada correctamente." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul-fondo: #0b1d2e;
      --crema: #f5f0e8;
      --acento: #c97b3a;
      --success: #2d8a56;
      --success-light: rgba(45, 138, 86, 0.12);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--azul-fondo);
      color: var(--crema);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* -- Ambient background glow -- */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(45, 138, 86, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(201, 123, 58, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .result-card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: center;
      background: linear-gradient(
        165deg,
        rgba(255, 255, 255, 0.06) 0%,
        rgba(255, 255, 255, 0.02) 100%
      );
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 3.5rem 2.5rem 3rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* -- Checkmark circle -- */
    .icon-wrapper {
      width: 96px;
      height: 96px;
      margin: 0 auto 2rem;
      position: relative;
    }

    .icon-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--success-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(45, 138, 86, 0.25); }
      50% { box-shadow: 0 0 0 18px rgba(45, 138, 86, 0); }
    }

    .checkmark-svg {
      width: 48px;
      height: 48px;
    }

    .checkmark-svg .circle {
      stroke: var(--success);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      animation: strokeCircle 0.6s 0.3s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-svg .check {
      stroke: var(--success);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: strokeCheck 0.4s 0.8s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    @keyframes strokeCircle {
      to { stroke-dashoffset: 0; }
    }

    @keyframes strokeCheck {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.85rem;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 1rem;
      color: var(--crema);
    }

    .subtitle {
      font-size: 1.05rem;
      color: rgba(245, 240, 232, 0.7);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .confirmation-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--success-light);
      color: var(--success);
      font-weight: 500;
      font-size: 0.85rem;
      padding: 0.5rem 1.15rem;
      border-radius: 100px;
      margin: 1.5rem 0 2rem;
      letter-spacing: 0.02em;
    }

    .confirmation-badge svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--acento);
      color: var(--azul-fondo);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 0.9rem 2rem;
      border-radius: 12px;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      letter-spacing: 0.01em;
    }

    .btn-back:hover {
      background: #d88a45;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 123, 58, 0.3);
    }

    .btn-back:active {
      transform: translateY(0);
    }

    .btn-back svg {
      width: 18px;
      height: 18px;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(245, 240, 232, 0.35);
    }

    /* -- Responsive -- */
    @media (max-width: 480px) {
      .result-card {
        padding: 2.5rem 1.5rem 2rem;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .icon-wrapper {
        width: 80px;
        height: 80px;
        margin-bottom: 1.5rem;
      }

      .icon-circle {
        width: 80px;
        height: 80px;
      }

      .checkmark-svg {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="result-card" role="main">
    <!-- Animated checkmark -->
    <div class="icon-wrapper">
      <div class="icon-circle">
        <svg class="checkmark-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle class="circle" cx="26" cy="26" r="25" />
          <path class="check" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
        </svg>
      </div>
    </div>

    <h1>Tu reserva ha sido confirmada</h1>

    <p class="subtitle">
      Gracias por reservar tu experiencia de pescaturismo con nosotros.
      Recibirás un email con todos los detalles de tu reserva.
    </p>

    <div class="confirmation-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      Pago procesado correctamente
    </div>

    <a href="/" class="btn-back" id="btn-volver-inicio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Volver al inicio
    </a>

    <p class="footer-note">De la Mar a sa Taula — Pescaturismo en Mallorca</p>
  </main>
</body>
</html>
