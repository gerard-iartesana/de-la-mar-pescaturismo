<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error en el pago — De la Mar a sa Taula</title>
  <meta name="description" content="Ha habido un problema con el pago de tu reserva de pescaturismo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul-fondo: #0b1d2e;
      --crema: #f5f0e8;
      --acento: #c97b3a;
      --error: #c0392b;
      --error-light: rgba(192, 57, 43, 0.12);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--azul-fondo);
      color: var(--crema);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* -- Ambient background glow -- */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(192, 57, 43, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(201, 123, 58, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .result-card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: center;
      background: linear-gradient(
        165deg,
        rgba(255, 255, 255, 0.06) 0%,
        rgba(255, 255, 255, 0.02) 100%
      );
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 3.5rem 2.5rem 3rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* -- Error icon -- */
    .icon-wrapper {
      width: 96px;
      height: 96px;
      margin: 0 auto 2rem;
      position: relative;
    }

    .icon-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--error-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: shake 0.6s 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    .error-svg {
      width: 48px;
      height: 48px;
    }

    .error-svg .circle {
      stroke: var(--error);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      animation: strokeDraw 0.6s 0.3s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .error-svg .cross-1,
    .error-svg .cross-2 {
      stroke: var(--error);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
    }

    .error-svg .cross-1 {
      animation: strokeDraw 0.3s 0.8s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .error-svg .cross-2 {
      animation: strokeDraw 0.3s 0.95s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    @keyframes strokeDraw {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.85rem;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 1rem;
      color: var(--crema);
    }

    .subtitle {
      font-size: 1.05rem;
      color: rgba(245, 240, 232, 0.7);
      line-height: 1.6;
      margin-bottom: 0.25rem;
    }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--error-light);
      color: var(--error);
      font-weight: 500;
      font-size: 0.85rem;
      padding: 0.5rem 1.15rem;
      border-radius: 100px;
      margin: 1.5rem 0 2rem;
      letter-spacing: 0.02em;
    }

    .error-badge svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--acento);
      color: var(--azul-fondo);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 0.9rem 2rem;
      border-radius: 12px;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      letter-spacing: 0.01em;
    }

    .btn-retry:hover {
      background: #d88a45;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 123, 58, 0.3);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    .btn-retry svg {
      width: 18px;
      height: 18px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(245, 240, 232, 0.55);
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .contact-link:hover {
      color: var(--crema);
    }

    .contact-link svg {
      width: 16px;
      height: 16px;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(245, 240, 232, 0.35);
    }

    /* -- Responsive -- */
    @media (max-width: 480px) {
      .result-card {
        padding: 2.5rem 1.5rem 2rem;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .icon-wrapper {
        width: 80px;
        height: 80px;
        margin-bottom: 1.5rem;
      }

      .icon-circle {
        width: 80px;
        height: 80px;
      }

      .error-svg {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="result-card" role="main">
    <!-- Animated error icon -->
    <div class="icon-wrapper">
      <div class="icon-circle">
        <svg class="error-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle class="circle" cx="26" cy="26" r="25" />
          <line class="cross-1" x1="18" y1="18" x2="34" y2="34" />
          <line class="cross-2" x1="34" y1="18" x2="18" y2="34" />
        </svg>
      </div>
    </div>

    <h1>Ha habido un problema con el pago</h1>

    <p class="subtitle">
      No se ha podido procesar el pago de tu reserva.
      Puedes intentarlo de nuevo o contactarnos directamente.
    </p>

    <div class="error-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      El pago no se ha completado
    </div>

    <div class="actions">
      <a href="/#reservar" class="btn-retry" id="btn-reintentar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        Intentar de nuevo
      </a>

      <a href="tel:+34600000000" class="contact-link" id="link-contacto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
        Contactar por teléfono
      </a>
    </div>

    <p class="footer-note">De la Mar a sa Taula — Pescaturismo en Mallorca</p>
  </main>
</body>
</html>
